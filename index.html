<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFinder — GitHub Profile Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F4F0;
    --card:#FFFFFF;
    --ink:#1B1C1F;
    --muted:#6B6E73;
    --accent:#3478F6;
    --line:#E3E1DA;
    --green:#1DAA61;
  }
  [data-theme="dark"]{
    --bg:#0D0E12;
    --card:#161821;
    --ink:#EDEEF2;
    --muted:#8B8E97;
    --line:#262834;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .3s,color .3s;}
  .mono{font-family:'Fragment Mono',monospace;}
  .wrap{max-width:560px;margin:0 auto;padding:60px 24px 80px;}

  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;}
  .brand{font-weight:700;font-size:1.2rem;display:flex;align-items:center;gap:8px;}
  .brand .mono{color:var(--accent);font-size:.95rem;}
  .theme-toggle{width:44px;height:44px;border-radius:10px;background:var(--card);border:1px solid var(--line);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}

  .search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 6px 6px 18px;box-shadow:0 6px 20px rgba(0,0,0,.04);margin-bottom:28px;}
  .search-box input{flex:1;border:none;outline:none;background:none;color:var(--ink);font-family:'Fragment Mono',monospace;font-size:.92rem;padding:14px 0;}
  .search-box input::placeholder{color:var(--muted);}
  .search-btn{background:var(--accent);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;font-family:'Space Grotesk';}
  .search-btn:hover{opacity:.9;}

  .error-box{display:none;background:#FDEAEA;color:#C03A3A;border-radius:12px;padding:16px 20px;font-size:.88rem;margin-bottom:20px;}
  [data-theme="dark"] .error-box{background:#2A1818;color:#F08A8A;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:none;}
  .profile-top{display:flex;gap:18px;align-items:flex-start;margin-bottom:18px;}
  .avatar{width:84px;height:84px;border-radius:50%;border:1px solid var(--line);object-fit:cover;}
  .name{font-size:1.25rem;font-weight:700;}
  .username{color:var(--accent);font-family:'Fragment Mono',monospace;font-size:.88rem;margin-top:2px;}
  .joined{color:var(--muted);font-size:.78rem;margin-top:6px;}

  .bio{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:22px;}

  .stats-bar{display:flex;justify-content:space-between;background:var(--bg);border-radius:12px;padding:16px 22px;margin-bottom:22px;}
  [data-theme="dark"] .stats-bar{background:#1B1D27;}
  .stat{text-align:left;}
  .stat-label{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .stat-val{font-weight:700;font-size:1.15rem;}

  .links-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .link-item{display:flex;align-items:center;gap:10px;font-size:.86rem;color:var(--muted);}
  .link-item.disabled{opacity:.5;}
  .link-item a{color:var(--ink);text-decoration:none;}
  .link-item a:hover{color:var(--accent);}

  .empty-state{text-align:center;color:var(--muted);padding:60px 20px;font-size:.92rem;}
  .empty-state .mono{display:block;font-size:.8rem;margin-top:8px;color:var(--muted);}

  .spinner{display:none;text-align:center;padding:50px 0;color:var(--muted);font-family:'Fragment Mono',monospace;font-size:.85rem;}

  @media(max-width:480px){
    .links-grid{grid-template-columns:1fr;}
    .profile-top{flex-direction:column;align-items:center;text-align:center;}
  }
</style>
</head>
<body data-theme="light">
<div class="wrap">
  <div class="top-row">
    <div class="brand">devfinder<span class="mono">.io</span></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="octocat" class="mono" onkeydown="if(event.key==='Enter') searchUser()">
    <button class="search-btn" onclick="searchUser()">Search</button>
  </div>

  <div class="error-box" id="errorBox">No results found.</div>
  <div class="spinner" id="spinner">Loading...</div>

  <div class="card" id="profileCard">
    <div class="profile-top">
      <img class="avatar" id="avatar" src="" alt="avatar">
      <div>
        <div class="name" id="name"></div>
        <div class="username mono" id="username"></div>
        <div class="joined" id="joined"></div>
      </div>
    </div>
    <div class="bio" id="bio"></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-label">Repos</div><div class="stat-val" id="repos"></div></div>
      <div class="stat"><div class="stat-label">Followers</div><div class="stat-val" id="followers"></div></div>
      <div class="stat"><div class="stat-label">Following</div><div class="stat-val" id="following"></div></div>
    </div>
    <div class="links-grid">
      <div class="link-item" id="locationItem">📍 <span id="location">Not Available</span></div>
      <div class="link-item" id="twitterItem">🐦 <span id="twitter">Not Available</span></div>
      <div class="link-item" id="blogItem">🔗 <span id="blog">Not Available</span></div>
      <div class="link-item" id="companyItem">🏢 <span id="company">Not Available</span></div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    Search any GitHub username to view their public profile.
    <span class="mono">Try: "torvalds" or "mabdulrehmandev"</span>
  </div>
</div>

<script>
function toggleTheme(){
  const body = document.body;
  const isDark = body.getAttribute('data-theme') === 'dark';
  body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
}

async function searchUser(){
  const username = document.getElementById('searchInput').value.trim();
  if(!username) return;

  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('profileCard').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';

  try {
    const res = await fetch(`https://api.github.com/users/${username}`);
    document.getElementById('spinner').style.display = 'none';

    if(!res.ok){
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    const data = await res.json();
    document.getElementById('avatar').src = data.avatar_url;
    document.getElementById('name').textContent = data.name || data.login;
    document.getElementById('username').textContent = '@' + data.login;
    document.getElementById('joined').textContent = 'Joined ' + new Date(data.created_at).toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
    document.getElementById('bio').textContent = data.bio || 'This user has no bio.';
    document.getElementById('repos').textContent = data.public_repos;
    document.getElementById('followers').textContent = data.followers;
    document.getElementById('following').textContent = data.following;
    document.getElementById('location').textContent = data.location || 'Not Available';
    document.getElementById('blog').innerHTML = data.blog ? `<a href="${data.blog}" target="_blank">${data.blog}</a>` : 'Not Available';
    document.getElementById('twitter').textContent = data.twitter_username ? '@'+data.twitter_username : 'Not Available';
    document.getElementById('company').textContent = data.company || 'Not Available';

    document.getElementById('profileCard').style.display = 'block';
  } catch(err){
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('errorBox').textContent = 'Something went wrong. Please try again.';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('emptyState').style.display = 'block';
  }
}
</script>
</body>
</html>
